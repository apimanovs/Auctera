<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Primary -->
    <title>Coutera — Rare Designer Fashion Auctions</title>

    <meta
      name="description"
      content="Coutera is a curated marketplace for rare designer fashion, archive clothing and luxury streetwear auctions. Discover authenticated designer pieces, collectible garments, runway archives and exclusive fashion lots from brands like Rick Owens, Vetements, Number (N)ine and more. Bid on unique pieces or sell premium fashion through secure online auctions built for collectors and fashion enthusiasts."
    />

    <meta
      property="og:description"
      content="Discover rare archive fashion, luxury streetwear and authenticated designer pieces through curated online auctions on Coutera. Bid on collectible fashion lots and exclusive garments from iconic designer brands."
    /> 

    <meta name="author" content="Coutera" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Canonical -->
    <link rel="canonical" href="https://coutera.eu/" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Coutera" />
    <meta property="og:title" content="Coutera — Rare Designer Fashion Auctions" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://coutera.eu/" />

    <meta
      property="og:image"
      content="https://coutera.eu/preview.jpg"
    />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta
      property="og:image:alt"
      content="Coutera rare designer fashion auction marketplace"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="Coutera — Rare Designer Fashion Auctions"
    />

    <meta
      name="twitter:description"
      content="Bid on rare designer fashion, archive clothing and luxury streetwear through curated online auctions on Coutera."
    />

    <meta
      name="twitter:image"
      content="https://coutera.eu/preview.jpg"
    />

    <!-- Extra SEO -->
    <meta name="application-name" content="Coutera" />
    <meta name="apple-mobile-web-app-title" content="Coutera" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "name": "Coutera",
      "alternateName": "Coutera Auctions",

        "target": "https://coutera.eu/catalog?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
